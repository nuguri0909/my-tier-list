<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>티어 게시판 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ⭐ 1번 요청 반영: 게시판 카드를 기존의 2/3 크기로 축소 (360px -> 240px) */
    .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    
    /* 카드 높이도 비례해서 축소 (420px -> 350px) */
    .tier-card { background: #1a1a24; border: 1px solid #2e2e3a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; height: 100%; min-height: 350px; }
    .tier-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
    
    /* ⭐ 이미지 영역 높이도 비례해서 축소 (200px -> 140px) */
    .tier-card-img { height: 140px; background: #111118; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #2e2e3a; }
    .tier-card-img img { width: 100%; height: 100%; object-fit: cover; }
    
    /* 제목 및 메타 정보 폰트 사이즈도 좁아진 폭에 맞게 살짝 조절 */
    .tier-card-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
    .card-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; color: #fff; word-break: keep-all; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { color: #aaa; font-size: 0.85rem; margin-bottom: 15px; line-height: 1.4; }
    .card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
    
    /* 댓글 영역 스타일 */
    .comment-list { flex: 1; overflow-y: auto; margin: 10px 0; padding-right: 10px; max-height: 250px;}
    .comment-item { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .reply-item { margin-left: 30px; border-left: 3px solid #3498db; padding-left: 10px; background: transparent; }
    .comment-author { font-weight: bold; color: #3498db; font-size: 0.9rem; }
    .comment-date { font-size: 0.75rem; color: #888; margin-left: 10px; }
    .comment-text { margin: 8px 0; font-size: 1rem; line-height: 1.4; }
    .btn-reply-open { background: transparent; color: #aaa; border: none; font-size: 0.8rem; cursor: pointer; padding: 0; }
    .btn-reply-open:hover { color: #fff; }
    .comment-input-box { display: flex; gap: 10px; margin-top: 10px; }
    .comment-input-box input { flex: 1; }
    .reply-input-box { display: flex; gap: 10px; margin-top: 10px; margin-left: 30px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu"></div>
  </nav>

  <div class="header" style="text-align: center; padding: 30px 20px;">
    <h1>티어 게시판</h1>
    <p style="color:#aaa;">다른 사람들이 만든 티어표를 구경하고, 항목을 눌러 설명을 확인하세요!</p>
    
    <div style="max-width: 700px; margin: 20px auto 0; display: flex; gap: 10px;">
      <select id="filter-category" class="control-input" style="width: 130px;" onchange="window.executeSearch()">
        <option value="all">전체 카테고리</option>
        <option value="애니">애니</option>
        <option value="게임">게임</option>
        <option value="영화">영화</option>
        <option value="음악">음악</option>
        <option value="만화">만화</option>
        <option value="소설">소설</option>
        <option value="캐릭터">캐릭터</option>   
        <option value="기타">기타</option>
      </select>
      <select id="search-type" class="control-input" style="width: 100px;">
        <option value="all">전체</option>
        <option value="title">제목</option>
        <option value="author">작성자</option>
      </select>
      <input type="text" id="search-input" class="control-input" style="flex:1;" placeholder="검색어 입력 후 엔터" onkeyup="if(event.key==='Enter') window.executeSearch()">
      <button class="btn btn-save" onclick="window.executeSearch()">검색</button>
      <button class="btn" onclick="window.resetSearch()" style="background:#555;">초기화</button>
    </div>
  </div>

  <div id="board-container" class="board-grid">
    <p style="text-align:center; color:#888; grid-column: 1 / -1;">데이터를 불러오는 중입니다...</p>
  </div>

  <div id="comment-modal" class="modal-overlay post-detail-modal" style="display:none;">
    <div class="modal-content">
      <button class="btn-close" onclick="window.closeCommentModal()">X</button>
      
      <div class="modal-header" style="display:flex; flex-direction:column; align-items:flex-start; margin-bottom: 20px;">
        <h3 id="modal-post-title" style="margin:0 0 15px 0; font-size:1.8rem; word-break: keep-all; line-height: 1.3;">제목 로딩 중...</h3>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div id="modal-post-author" style="font-size: 1rem; color: #aaaaaa; font-weight: bold;">작성자 로딩 중...</div>
          <div id="modal-post-category" style="font-size: 1rem; color: #3498db; font-weight: bold;">카테고리 로딩 중...</div>
        </div>
      </div>
      
      <div style="max-height: 40vh; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px;">
        <div id="board-viewer" class="board-viewer"></div>
      </div>
      
      <div id="vote-section" style="display: flex; gap: 10px; justify-content: center; margin: 20px 0;"></div>
      
      <div id="comment-list" class="comment-list"></div>

      <div id="comment-auth-guard" style="text-align:center; padding:15px; background:#2a2a2a; border-radius:8px; color:#aaa;">
        로그인 후 댓글을 남길 수 있습니다.
      </div>
      <div id="comment-input-area" class="comment-input-box" style="display:none;">
        <input type="text" id="new-comment-text" class="control-input" placeholder="아름다운 인터넷 문화를 위해 바른 말을 사용해주세요.">
        <button class="btn btn-save" onclick="window.submitComment()">등록</button>
      </div>
    </div>
  </div>

  <div id="ro-item-modal" class="modal-overlay" style="display:none; z-index: 3000;">
    <div class="modal-content">
      <button class="btn-close" onclick="document.getElementById('ro-item-modal').style.display='none'">X</button>
      <div class="modal-body">
        <div class="modal-left">
          <img id="ro-modal-img" src="">
        </div>
        <div class="modal-right">
          <h2 id="ro-modal-title" style="margin-top:0; color:#3498db; padding-right:20px; font-size:1.8rem; word-break:keep-all;"></h2>
          <div id="ro-modal-desc" class="modal-desc-view" style="overflow-y:auto; white-space:pre-wrap;"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, addDoc, deleteDoc, query, orderBy, serverTimestamp, onSnapshot, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAwVjpUANfil947xb0bjKALw2uuGvZYQcs",
      authDomain: "mytierlist-70989.firebaseapp.com",
      projectId: "mytierlist-70989",
      storageBucket: "mytierlist-70989.firebasestorage.app",
      messagingSenderId: "13881580770",
      appId: "1:13881580770:web:6f7f9148c4bf5f95add2bb"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAILS = ["fjrzlsiyoung@gmail.com"]; 

    let currentPostId = null; 
    let commentsUnsubscribe = null; 
    let allBoardData = [];
    window.hasOpenedModalFromUrl = false;
    
    onAuthStateChanged(auth, (user) => {
      const prevUser = window.currentUser;
      window.currentUser = user;
      const userMenu = document.querySelector('.user-menu');
      
      if(user) {
        const isAdmin = ADMIN_EMAILS.includes(user.email);
        const adminTag = isAdmin ? " <span style='font-size:0.8rem;'>(👑관리자)</span>" : "";
        const displayName = user.displayName || "익명";
        
        userMenu.innerHTML = `
          <button onclick="window.setNickname()" style="background:none; border:none; color:#fff; font-size:1rem; font-weight:bold; cursor:pointer; font-family:inherit; padding:5px; transition:0.2s;" onmouseover="this.style.color='#3498db'" onmouseout="this.style.color='#fff'">
            ${displayName}${adminTag}
          </button>
          <span style="color:#555; font-weight:bold; margin:0 5px;">/</span>
          <button onclick="window.logout()" style="background:#3498db; color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:bold; cursor:pointer; font-family:inherit; transition:0.2s;" onmouseover="this.style.background='#2980b9'" onmouseout="this.style.background='#3498db'">
            로그아웃
          </button>
        `;
        document.getElementById('comment-auth-guard').style.display = 'none';
        document.getElementById('comment-input-area').style.display = 'flex';
      } else {
        userMenu.innerHTML = `
          <button onclick="window.login()" style="background:#3498db; color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:bold; cursor:pointer; font-family:inherit; transition:0.2s;" onmouseover="this.style.background='#2980b9'" onmouseout="this.style.background='#3498db'">
            구글 로그인
          </button>
        `;
        document.getElementById('comment-auth-guard').style.display = 'block';
        document.getElementById('comment-input-area').style.display = 'none';
      }
      
      if(prevUser !== user && allBoardData.length > 0) window.executeSearch();
    });

    async function loadBoard() {
      const container = document.getElementById('board-container');
      try {
        const q = query(collection(db, "tierLists"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        
        allBoardData = [];
        snapshot.forEach(docSnap => {
          allBoardData.push({ id: docSnap.id, ...docSnap.data() });
        });
        window.executeSearch(); 

        const urlParams = new URLSearchParams(window.location.search);
        const urlPostId = urlParams.get('id');
        if(urlPostId && !window.hasOpenedModalFromUrl) {
          window.hasOpenedModalFromUrl = true; 
          const targetPost = allBoardData.find(p => p.id === urlPostId);
          if(targetPost) {
            window.openCommentModal(targetPost.id, targetPost.authorName);
          }
        }

      } catch (error) {
        container.innerHTML = `<p style="color:red; text-align:center; grid-column: 1 / -1;">에러 발생: ${error.message}</p>`;
      }
    }

    function renderBoard(dataList) {
      const container = document.getElementById('board-container');
      container.innerHTML = '';
      if(dataList.length === 0) {
        container.innerHTML = '<p style="text-align:center; grid-column: 1 / -1;">조건에 맞는 티어표가 없습니다!</p>';
        return;
      }

      dataList.forEach(data => {
        const dateStr = data.createdAt && data.createdAt.toDate ? data.createdAt.toDate().toLocaleDateString() : "최근";
        const isAdmin = window.currentUser && ADMIN_EMAILS.includes(window.currentUser.email);
        const isAuthor = window.currentUser && window.currentUser.uid === data.authorId;
        const canDeletePost = isAuthor || isAdmin;
        
        const deleteBtnHtml = canDeletePost ? `<button class="btn" style="background:#e74c3c; width:100%; padding: 8px; font-size: 0.9rem;" onclick="window.deletePost('${data.id}')">이 게시글 삭제하기</button>` : '';

        // 썸네일 이미지 추출
        const imgUrl = (data.tiers && data.tiers[0] && data.tiers[0].items[0]) ? data.tiers[0].items[0].src : 'https://via.placeholder.com/300x150?text=No+Image';
        const finalImgUrl = data.thumbnailUrl || imgUrl;

        const card = document.createElement('div');
        card.className = 'tier-card';
        card.innerHTML = `
          <div class="tier-card-img">
            <img src="${finalImgUrl}" alt="대표 이미지">
          </div>
          <div class="tier-card-info">
            <div class="card-title">${data.title || data.category + " 티어표"}</div>
            <div class="card-meta">
              <span style="color:#2ecc71; font-weight:bold;">[${data.category || "기타"}]</span> | 
              작성자: <span style="cursor:pointer; color:#3498db; text-decoration:underline;" onclick="window.searchByAuthor('${data.authorName}')">${data.authorName}</span><br>
              ${dateStr} <br>
              ❤️ ${data.likes || 0} &nbsp; 👁️ ${data.views || 0}
            </div>
            <div class="card-actions">
              ${deleteBtnHtml}
              <button class="btn btn-save" style="width:100%; padding: 8px; font-size: 0.9rem; margin-bottom: 5px;" onclick="window.openCommentModal('${data.id}', '${data.authorName}')">구경 및 댓글 보기</button>
              <div style="display:flex; gap:5px;">
                <button class="btn btn-small" style="flex:1; padding: 8px; background:#2a2a36; border: 1px solid #444;" onclick="location.href='maker.html?load=${data.id}&mode=v1'">티어 유지</button>
                <button class="btn btn-small" style="flex:1; padding: 8px; background:#2a2a36; border: 1px solid #444;" onclick="location.href='maker.html?load=${data.id}&mode=v2'">티어 재배치</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.executeSearch = () => {
      const catFilter = document.getElementById('filter-category').value;
      const type = document.getElementById('search-type').value;
      const keyword = document.getElementById('search-input').value.toLowerCase().trim();

      const filtered = allBoardData.filter(data => {
        const matchCategory = (catFilter === 'all') || (data.category === catFilter);
        const titleCat = (data.title || "") + " " + (data.category || "");
        const author = data.authorName || "";
        let matchKeyword = true;
        if(keyword) {
          if(type === 'title') matchKeyword = titleCat.toLowerCase().includes(keyword);
          else if(type === 'author') matchKeyword = author.toLowerCase().includes(keyword);
          else matchKeyword = titleCat.toLowerCase().includes(keyword) || author.toLowerCase().includes(keyword);
        }
        return matchCategory && matchKeyword;
      });
      renderBoard(filtered);
    };

    window.resetSearch = () => {
      document.getElementById('search-input').value = '';
      document.getElementById('search-type').value = 'all';
      document.getElementById('filter-category').value = 'all';
      renderBoard(allBoardData);
    };

    window.searchByAuthor = (authorName) => {
      document.getElementById('search-type').value = 'author';
      document.getElementById('search-input').value = authorName;
      document.getElementById('filter-category').value = 'all';
      window.executeSearch();
      window.scrollTo(0, 0); 
    };

    window.deletePost = async (postId) => {
      if(!confirm("이 게시글을 정말 삭제하시겠습니까?\n(한 번 삭제하면 복구할 수 없습니다.)")) return;
      try {
        await deleteDoc(doc(db, "tierLists", postId));
        alert("게시글이 삭제되었습니다.");
        loadBoard(); 
      } catch(e) { alert("삭제 실패: " + e.message); }
    };

    window.likePost = async () => {
      if(!window.currentUser) return alert("로그인이 필요합니다.");
      if(!currentPostId) return;

      try {
        const postRef = doc(db, "tierLists", currentPostId);
        const postSnap = await getDoc(postRef);
        
        if (postSnap.exists()) {
          const data = postSnap.data();
          const likedUsers = data.likedUsers || []; 
          
          if (likedUsers.includes(window.currentUser.uid)) {
            return alert("이미 좋아요를 누르셨습니다! ❤️");
          }

          await updateDoc(postRef, {
            likes: increment(1),
            likedUsers: arrayUnion(window.currentUser.uid)
          });
          
          const countSpan = document.getElementById('like-count-display');
          if(countSpan) countSpan.innerText = parseInt(countSpan.innerText) + 1;
          
          alert("좋아요를 눌렀습니다! ❤️");
          loadBoard(); 
        }
      } catch(e) {
        alert("오류가 발생했습니다: " + e.message);
      }
    };

    window.openCommentModal = async (postId, authorName) => {
      currentPostId = postId;
      
      const postData = allBoardData.find(p => p.id === postId);
      const displayTitle = postData && postData.title ? postData.title : "무제 티어표";
      
      document.getElementById('modal-post-title').innerText = displayTitle;
      document.getElementById('modal-post-author').innerText = `작성자: ${authorName || '익명'}`;
      document.getElementById('modal-post-category').innerText = `카테고리 로딩 중...`;
      
      document.getElementById('comment-modal').style.display = 'flex';
      
      const viewer = document.getElementById('board-viewer');
      const catDiv = document.getElementById('modal-post-category');
      const voteSection = document.getElementById('vote-section');
      
      viewer.innerHTML = '<p style="color:#aaa; text-align:center;">티어표를 불러오는 중...</p>';
      voteSection.innerHTML = '';
      
      try {
        const postRef = doc(db, "tierLists", postId);
        await updateDoc(postRef, { views: increment(1) });
        loadBoard(); 

        const docSnap = await getDoc(postRef);
        if(docSnap.exists()) {
          const data = docSnap.data();
          viewer.innerHTML = ''; 
          
          document.getElementById('modal-post-title').innerText = data.title || "무제 티어표";
          catDiv.innerText = `카테고리: ${data.category || '지정되지 않음'}`;
          
          voteSection.innerHTML = `<button class="btn btn-save" onclick="window.likePost()" style="font-size: 1.1rem; padding: 10px 20px; background: #e74c3c;">❤️ 좋아요 (<span id="like-count-display">${data.likes || 0}</span>)</button>`;
          
          if(data.tiers && data.tiers.length > 0) {
            data.tiers.forEach(tier => {
              let itemsHtml = tier.items.map(it => {
                const encTitle = encodeURIComponent(it.title || "");
                const encDesc = encodeURIComponent(it.desc || "");
                return `
                  <div class="item" style="cursor:pointer; transition: transform 0.1s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="window.openReadOnlyItem('${it.src}', '${encTitle}', '${encDesc}')">
                    <img src="${it.src}">
                    ${it.title ? `<div class="item-title">${it.title}</div>` : ''}
                  </div>
                `;
              }).join('');

              viewer.innerHTML += `
                <div class="tier-row" style="margin-bottom: 5px; padding-right:0;">
                  <div class="tier-label" style="background-color: ${tier.color || '#ccc'};">${tier.label}</div>
                  <div class="tier-items">${itemsHtml}</div>
                </div>
              `;
            });
          } else { viewer.innerHTML = '<p style="color:#aaa; text-align:center;">등록된 티어 항목이 없습니다.</p>'; }
        }
      } catch(e) { viewer.innerHTML = '<p style="color:red; text-align:center;">티어표를 불러오지 못했습니다.</p>'; }
      
      const listContainer = document.getElementById('comment-list');
      listContainer.innerHTML = '<p style="text-align:center; color:#888;">댓글을 불러오는 중...</p>';
      const commentsRef = collection(db, "tierLists", postId, "comments");
      const q = query(commentsRef, orderBy("createdAt", "asc"));
      
      commentsUnsubscribe = onSnapshot(q, (snapshot) => {
        listContainer.innerHTML = '';
        if(snapshot.empty) {
          listContainer.innerHTML = '<p style="text-align:center; color:#888;">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</p>';
          return;
        }

        const commentsMap = new Map();
        const topLevelComments = [];
        snapshot.forEach(docSnap => {
          const data = Object.assign({ id: docSnap.id }, docSnap.data());
          data.replies = []; 
          commentsMap.set(data.id, data);
          if(data.parentId) {
            if(commentsMap.has(data.parentId)) commentsMap.get(data.parentId).replies.push(data);
          } else { topLevelComments.push(data); }
        });
        topLevelComments.forEach(comment => {
          listContainer.appendChild(createCommentHTML(comment, false));
          comment.replies.forEach(reply => listContainer.appendChild(createCommentHTML(reply, true)));
        });
        listContainer.scrollTop = listContainer.scrollHeight;
      });
    };

    window.closeCommentModal = () => {
      document.getElementById('comment-modal').style.display = 'none';
      currentPostId = null;
      window.history.replaceState({}, document.title, window.location.pathname);
      if(commentsUnsubscribe) { commentsUnsubscribe(); commentsUnsubscribe = null; }
    };

    window.openReadOnlyItem = (src, encTitle, encDesc) => {
      document.getElementById('ro-modal-img').src = src;
      const title = decodeURIComponent(encTitle);
      document.getElementById('ro-modal-title').innerText = title ? title : "이름 없음";
      const desc = decodeURIComponent(encDesc);
      document.getElementById('ro-modal-desc').innerText = desc ? desc : "상세 설명이 등록되지 않았습니다.";
      document.getElementById('ro-item-modal').style.display = 'flex';
    };

    function createCommentHTML(data, isReply) {
      const div = document.createElement('div');
      div.className = isReply ? 'comment-item reply-item' : 'comment-item';
      const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleString() : "방금 전";
      const isAdmin = window.currentUser && ADMIN_EMAILS.includes(window.currentUser.email);
      const isAuthor = window.currentUser && window.currentUser.uid === data.authorId;
      const canDelete = isAuthor || isAdmin;

      let html = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div><span class="comment-author">${data.authorName}</span><span class="comment-date">${dateStr}</span></div>
          ${canDelete ? `<button class="btn-delete-comment" onclick="window.deleteComment('${data.id}')">삭제</button>` : ''}
        </div>
        <div class="comment-text">${data.text}</div>
      `;
      if (!isReply && window.currentUser) {
        html += `<button class="btn-reply-open" onclick="window.showReplyInput('${data.id}')">↳ 답글 달기</button>
          <div id="reply-box-${data.id}" class="reply-input-box" style="display:none;">
            <input type="text" id="reply-input-${data.id}" class="control-input" placeholder="답글을 입력하세요">
            <button class="btn btn-save btn-small" onclick="window.submitComment('${data.id}')">확인</button>
            <button class="btn btn-small" onclick="window.hideReplyInput('${data.id}')">취소</button>
          </div>`;
      }
      div.innerHTML = html;
      return div;
    }

    window.deleteComment = async (commentId) => {
      if(!confirm("정말 이 댓글을 삭제하시겠습니까?")) return;
      try { await deleteDoc(doc(db, "tierLists", currentPostId, "comments", commentId)); } 
      catch(e) { alert("댓글 삭제 실패: " + e.message); }
    };

    window.showReplyInput = (commentId) => {
      document.getElementById(`reply-box-${commentId}`).style.display = 'flex';
      document.getElementById(`reply-input-${commentId}`).focus();
    };
    window.hideReplyInput = (commentId) => {
      document.getElementById(`reply-box-${commentId}`).style.display = 'none';
      document.getElementById(`reply-input-${commentId}`).value = '';
    };

    window.submitComment = async (parentId = null) => {
      if(!window.currentUser) return alert("로그인이 필요합니다.");
      let inputElem = parentId ? document.getElementById(`reply-input-${parentId}`) : document.getElementById('new-comment-text');
      const text = inputElem.value.trim();
      if(!text) return alert("내용을 입력해주세요!");

      const payload = {
        text: text, authorId: window.currentUser.uid, authorName: window.currentUser.displayName || "익명",
        parentId: parentId, createdAt: serverTimestamp()
      };
      try {
        await addDoc(collection(db, "tierLists", currentPostId, "comments"), payload);
        inputElem.value = ''; 
        if(parentId) window.hideReplyInput(parentId);
      } catch (error) { alert("댓글 등록 실패: " + error.message); }
    };

    window.onload = () => loadBoard();
  </script>
