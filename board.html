<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시판 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-bar { display: flex; justify-content: center; gap: 10px; margin: 20px auto; max-width: 1200px; padding: 0 20px; flex-wrap: wrap; }
    .search-input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white; width: 250px; }
    .card-title { font-size: 1.3rem; margin: 0 0 10px 0; color: #fff; }
    .card-meta { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
    .card-info { display: flex; justify-content: space-between; font-size: 0.9rem; color: #888; border-top: 1px solid #333; padding-top: 15px; }
    .author-link { color: #3498db; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">TierMaker</a>
      <div class="nav-links">
        <a href="index.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu">
      <span id="user-name-display" class="user-name">로그인해주세요</span>
      <button class="btn btn-small" id="btn-nickname" style="display:none;" onclick="setNickname()">닉네임 설정</button>
      <button class="btn btn-small btn-save" id="btn-login" onclick="login()">구글 로그인</button>
      <button class="btn btn-small" id="btn-logout" style="display:none;" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="header">
    <h1>📋 티어표 게시판</h1>
  </div>

  <div class="filter-bar">
    <input type="text" id="search-bar" class="search-input" placeholder="제목 또는 제작자 검색..." onkeyup="if(event.key==='Enter') filterLists()">
    <select id="category-filter" class="search-input" style="width: 150px;">
      <option value="all">전체 카테고리</option>
      <option value="영화">영화</option>
      <option value="애니메이션">애니메이션</option>
      <option value="게임">게임</option>
      <option value="소설/만화">소설/만화</option>
      <option value="기타">기타</option>
    </select>
    <button class="btn btn-save" onclick="filterLists()">🔍 검색</button>
  </div>

  <div class="grid-container" id="board-list"></div>

  <script>
    // 💡 더미 데이터를 비웠습니다.
    const dbList = [];

    // 로그인 공통 로직 (실제 개발 시 별도 js 파일로 분리하는 것이 좋습니다)
    let currentUser = null; let customNickname = "익명";
    function login() { currentUser = {uid:"1"}; updateAuthUI(); alert("로그인 되었습니다."); }
    function logout() { currentUser = null; updateAuthUI(); alert("로그아웃 되었습니다."); }
    function setNickname() { const n = prompt("닉네임:", customNickname); if(n) { customNickname = n; updateAuthUI(); } }
    function updateAuthUI() {
      const nm = document.getElementById('user-name-display');
      if(currentUser) {
        nm.innerText = customNickname + "님";
        document.getElementById('btn-login').style.display='none';
        document.getElementById('btn-logout').style.display='inline-block';
        document.getElementById('btn-nickname').style.display='inline-block';
      } else {
        nm.innerText = "로그인해주세요";
        document.getElementById('btn-login').style.display='inline-block';
        document.getElementById('btn-logout').style.display='none';
        document.getElementById('btn-nickname').style.display='none';
      }
    }

    function renderLists(lists) {
      const container = document.getElementById('board-list');
      container.innerHTML = '';
      if (lists.length === 0) {
        container.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 50px; color: #888;">아직 등록된 티어표가 없습니다. 첫 티어표의 주인공이 되어보세요!</div>';
        return;
      }
      // 리스트 렌더링 로직 (데이터가 있을 때 작동)
    }

    function filterLists() { renderLists(dbList); }

    window.onload = function() {
      updateAuthUI();
      renderLists(dbList);
    };
  </script>
</body>
</html>
