<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시판 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* -------------------------------------
       게시판 전용 추가 디자인
       ------------------------------------- */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      max-width: 1200px;
      padding: 0 20px;
      flex-wrap: wrap;
    }
    .search-input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: white;
      width: 300px;
      font-size: 1rem;
    }
    
    /* 💡 가로 2열 배치 핵심 기술 (CSS Grid) */
    .list-container {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 가로 공간을 1:1로 정확히 반반 나눔 */
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* 티어 카드 디자인 */
    .tier-card {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 25px;
      border: 1px solid #333;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .tier-card:hover {
      transform: translateY(-5px); /* 마우스 올리면 살짝 위로 떠오름 */
      border-color: #3498db;
    }
    .card-title {
      font-size: 1.5rem;
      margin: 0 0 10px 0;
      color: #fff;
    }
    .card-meta {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 20px;
    }
    .card-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: #888;
      border-top: 1px solid #333;
      padding-top: 15px;
    }
    
    /* 제작자 이름 클릭 시 스타일 */
    .author-link {
      color: #3498db;
      font-weight: bold;
      text-decoration: none;
    }
    .author-link:hover {
      text-decoration: underline;
    }

    /* 특정 제작자 모아보기 상태 안내창 */
    .profile-notice {
      text-align: center;
      background: rgba(52, 152, 219, 0.1);
      border: 1px solid #3498db;
      color: #3498db;
      padding: 15px;
      border-radius: 8px;
      max-width: 1160px;
      margin: 0 auto 20px auto;
      display: none; /* 기본적으로는 숨김 */
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📋 티어표 게시판</h1>
    <div class="controls">
      <button class="btn" onclick="location.href='index.html'">⬅️ 티어 만들기 돌아가기</button>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="search-bar" class="search-input" placeholder="티어표 제목 또는 제작자 검색..." onkeyup="if(event.key==='Enter') filterLists()">
    <select id="category-filter" class="search-input" style="width: 150px;">
      <option value="all">전체 카테고리</option>
      <option value="영화">영화</option>
      <option value="애니메이션">애니메이션</option>
      <option value="게임">게임</option>
      <option value="소설/만화">소설/만화</option>
      <option value="기타">기타</option>
    </select>
    <button class="btn btn-save" onclick="filterLists()">🔍 검색</button>
  </div>

  <div id="profile-notice" class="profile-notice">
    <h2><span id="profile-name"></span>님의 티어표 모아보기 중입니다.</h2>
    <button class="btn" onclick="location.href='board.html'" style="margin-top: 10px;">전체 보기로 돌아가기</button>
  </div>

  <div class="list-container" id="board-list">
    </div>

  <script>
    // 💡 테스트용 임시 데이터 (나중에 Firebase DB 연결 시 이 부분을 대체하세요!)
    const mockDatabase = [
      { id: "doc1", title: "2024년 최고의 RPG 게임", category: "게임", authorName: "겜돌이", views: 1024 },
      { id: "doc2", title: "마블 영화 티어리스트", category: "영화", authorName: "영화광", views: 563 },
      { id: "doc3", title: "이번 분기 신작 애니 순위", category: "애니메이션", authorName: "애니장인", views: 241 },
      { id: "doc4", title: "고전 명작 소설 추천", category: "소설/만화", authorName: "글쟁이", views: 98 },
      { id: "doc5", title: "롤 챔피언 티어표 (14시즌)", category: "게임", authorName: "겜돌이", views: 3200 },
      { id: "doc6", title: "가장 좋아하는 과자 순위", category: "기타", authorName: "과자킬러", views: 15 }
    ];

    // 화면에 티어표 카드들을 그려주는 함수
    function renderLists(lists) {
      const container = document.getElementById('board-list');
      container.innerHTML = ''; // 기존 내용을 깨끗이 지움
      
      if (lists.length === 0) {
        container.innerHTML = '<h3 style="text-align:center; color:#888; grid-column: span 2; padding: 50px;">검색 결과가 없습니다 텅~</h3>';
        return;
      }

      lists.forEach(list => {
        const card = document.createElement('div');
        card.className = 'tier-card';
        
        // 카드 안에 들어갈 내용 HTML 조합
        card.innerHTML = `
          <h3 class="card-title">${list.title}</h3>
          <div class="card-meta">📁 카테고리: ${list.category}</div>
          <div class="card-info">
            <span>제작자: <a class="author-link" href="board.html?user=${encodeURIComponent(list.authorName)}">@${list.authorName}</a></span>
            <span>👁️ ${list.views.toLocaleString()}회 조회</span>
          </div>
        `;

        // 카드 전체(빈 공간)를 클릭했을 때 해당 티어표로 이동하는 기능
        card.onclick = (e) => {
          // 클릭한 곳이 a태그(제작자 이름)가 아닐 때만 상세 페이지로 이동
          if(!e.target.classList.contains('author-link')) {
            // 실제 서비스에서는 아래 주석을 풀어서 사용하세요!
            // location.href = `index.html?id=${list.id}`;
            alert(`[${list.title}] 티어표를 열어봅니다!\n(나중에 index.html?id=${list.id} 로 연결됩니다)`);
          }
        };

        container.appendChild(card);
      });
    }

    // 검색창과 카테고리 옵션에 맞게 데이터 걸러내기
    function filterLists() {
      const searchTerm = document.getElementById('search-bar').value.toLowerCase();
      const categoryTerm = document.getElementById('category-filter').value;
      
      const filteredData = mockDatabase.filter(list => {
        // 제목이나 제작자 이름에 검색어가 포함되어 있는지 확인
        const matchSearch = list.title.toLowerCase().includes(searchTerm) || list.authorName.toLowerCase().includes(searchTerm);
        // 카테고리가 일치하는지 확인 (전체 보기면 무조건 통과)
        const matchCategory = categoryTerm === 'all' || list.category === categoryTerm;
        
        return matchSearch && matchCategory;
      });
      
      renderLists(filteredData);
    }

    // 화면이 처음 켜질 때 실행되는 마법 (프로필 모아보기 감지)
    window.onload = function() {
      // 주소창(URL)에 ?user=홍길동 같은 글자가 숨어있는지 찾아냅니다.
      const urlParams = new URLSearchParams(window.location.search);
      const userProfile = urlParams.get('user');

      if (userProfile) {
        // 특정 제작자의 모아보기 상태라면!
        document.getElementById('profile-notice').style.display = 'block';
        document.getElementById('profile-name').innerText = userProfile;
        
        // 그 사람이 만든 글만 걸러서 화면에 그려줍니다.
        const userLists = mockDatabase.filter(list => list.authorName === userProfile);
        renderLists(userLists);
      } else {
        // 평범하게 들어왔다면 모든 글을 다 보여줍니다.
        renderLists(mockDatabase);
      }
    };
  </script>
</body>
</html>
