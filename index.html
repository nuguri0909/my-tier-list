<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MyTierList - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 배너 및 홈 그리드 최적화 스타일 */
    .wide-banner-card {
      display: flex; background: rgba(255, 255, 255, 0.05); border: 1px solid #3a3a4a;
      border-radius: 16px; max-width: 1200px; margin: 0 auto 20px auto; padding: 40px;
      align-items: center; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .wide-banner-content { text-align: left; max-width: 60%; }
    .wide-banner-title { font-size: 1.8rem; font-weight: bold; color: #ffffff; margin-bottom: 15px; }
    .wide-banner-desc { font-size: 1.05rem; color: #cccccc; line-height: 1.6; margin-bottom: 25px; word-break: keep-all; }
    .wide-banner-btn { background: #3498db; color: #fff; font-size: 1.1rem; font-weight: bold; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .wide-banner-btn:hover { background: #2980b9; transform: translateY(-2px); }
    .wide-banner-img { width: 35%; height: 180px; background: #1a1a24; border: 1px dashed #555; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #666; overflow: hidden; }

    /* ⭐ 2번 요청: 좌우 5개 배치 고정 */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr) !important;
      gap: 15px;
      max-width: 1200px !important;
      margin: 0 auto 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .home-section-title { max-width: 1200px !important; margin: 40px auto 20px auto; text-align: left !important; }

    @media (max-width: 1024px) { .home-grid { grid-template-columns: repeat(3, 1fr) !important; } }
    @media (max-width: 768px) { .home-grid { grid-template-columns: 1fr !important; } .wide-banner-card { flex-direction: column; padding: 20px; } }

    /* ⭐ 1번 요청: 로그인 버튼 디자인 */
    .user-menu { display: flex; align-items: center; gap: 15px; margin-left: auto; }
    .user-name { color: #fff; font-weight: bold; font-size: 0.95rem; }
    .login-btn-header { background: #3498db; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .login-btn-header:hover { background: #2980b9; }
    .logout-btn-header { background: #e74c3c !important; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left" style="display: flex; width: 100%; align-items: center;">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
      <div class="user-menu" id="user-menu">
        <span id="user-info" class="user-name"></span>
        <button id="login-btn" class="login-btn-header">Google 로그인</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="hero-section" style="text-align: center; margin-bottom: 50px;">
      <h1 style="font-size: 2.5rem; margin-bottom: 10px;">MyTierList</h1>
      <p style="color: #aaa; margin-bottom: 30px;">나만의 기준으로 세상을 분류하고, 사람들과 즐겁게 공유하세요.</p>
      
      <div class="wide-banner-card">
        <div class="wide-banner-content">
          <h2 class="wide-banner-title">세상의 모든 것을 줄 세우다</h2>
          <p class="wide-banner-desc">게임, 애니메이션, 음식 등 어떤 주제든 쉽고 빠르게 티어표를 제작해 보세요.</p>
          <button class="wide-banner-btn" onclick="location.href='maker.html'">✨ 새 티어 만들기</button>
        </div>
        <div class="wide-banner-img" id="dynamic-banner"><span>이미지 로딩중...</span></div>
      </div>
    </div>

    <h2 class="home-section-title"><span style="border-left: 5px solid #e74c3c; padding-left: 15px;">🔥 주간 인기 티어리스트</span></h2>
    <div id="popular-grid"></div>

    <h2 class="home-section-title"><span style="border-left: 5px solid #2ecc71; padding-left: 15px;">🕒 방금 올라온 티어리스트</span></h2>
    <div id="recent-grid"></div>

    <div id="random-category-container"></div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, limit, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ⚠️ 본인의 Firebase 설정값을 사용하세요
    const firebaseConfig = {
      apiKey: "AIzaSyAwVjpUANfil947xb0bjKALw2uuGvZYQcs",
      authDomain: "mytierlist-70989.firebaseapp.com",
      projectId: "mytierlist-70989",
      storageBucket: "mytierlist-70989.firebasestorage.app",
      messagingSenderId: "13881580770",
      appId: "1:13881580770:web:6f7f9148c4bf5f95add2bb"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);
    const auth = getAuth(app);

    // 로그인 상태 처리
    const loginBtn = document.getElementById("login-btn");
    const userInfo = document.getElementById("user-info");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        userInfo.textContent = `${user.displayName}님`;
        loginBtn.textContent = "로그아웃";
        loginBtn.classList.add("logout-btn-header");
        loginBtn.onclick = () => signOut(auth);
      } else {
        userInfo.textContent = "";
        loginBtn.textContent = "Google 로그인";
        loginBtn.classList.remove("logout-btn-header");
        loginBtn.onclick = () => {
          const provider = new GoogleAuthProvider();
          signInWithPopup(auth, provider);
        };
      }
    });

    // 배너 로드
    async function loadBannerImage() {
      const bannerContainer = document.getElementById("dynamic-banner");
      try {
        const bannerDoc = await getDoc(doc(db, "siteSettings", "banner"));
        if (bannerDoc.exists() && bannerDoc.data().imageUrl) {
          bannerContainer.innerHTML = `<img src="${bannerDoc.data().imageUrl}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
          bannerContainer.innerHTML = `<span>MyTierList</span>`;
        }
      } catch (e) { bannerContainer.innerHTML = `<span>MyTierList</span>`; }
    }

    // 카드 렌더링 (⭐ 2번 요청: 좌우 5개)
    function renderCards(posts, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = posts.length ? "" : '<p style="grid-column: 1/-1; text-align:center; color:#888;">데이터가 없습니다.</p>';
      container.className = 'home-grid';
      
      posts.forEach(post => {
        const card = `
          <div class="home-tier-card" style="background:#1f1f1f; border-radius:10px; overflow:hidden; cursor:pointer;" onclick="location.href='board.html?id=${post.id}'">
            <div style="height:140px; background:#111;">
              <img src="${post.thumbnailUrl || 'https://via.placeholder.com/300x150'}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="padding:12px;">
              <h3 style="font-size:0.95rem; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${post.title || '무제'}</h3>
              <div style="font-size:0.8rem; color:#888;">${post.authorName || '익명'}</div>
              <div style="font-size:0.75rem; color:#666; margin-top:4px;">❤️ ${post.likes || 0}  👁️ ${post.views || 0}</div>
            </div>
          </div>`;
        container.insertAdjacentHTML('beforeend', card);
      });
    }

    async function loadHomePosts() {
      const postsRef = collection(db, "tierLists");
      // ⭐ 2번 요청: limit(5) 적용
      const popular = await getDocs(query(postsRef, orderBy("likes", "desc"), limit(5)));
      renderCards(popular.docs.map(d => ({id:d.id, ...d.data()})), "popular-grid");
      const recent = await getDocs(query(postsRef, orderBy("createdAt", "desc"), limit(5)));
      renderCards(recent.docs.map(d => ({id:d.id, ...d.data()})), "recent-grid");
    }

    // 카테고리 섹션 (⭐ 2번 요청: limit(5) 적용)
    async function loadRandomCategories() {
      const categories = ["애니", "게임", "영화", "음식"].sort(() => 0.5 - Math.random()).slice(0, 2);
      const container = document.getElementById("random-category-container");
      for (const cat of categories) {
        const q = query(collection(db, "tierLists"), where("category", "==", cat), limit(5));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const html = `<h2 class="home-section-title"><span style="border-left: 5px solid #3498db; padding-left: 15px;">✨ 지금 뜨는 [${cat}]</span></h2><div id="grid-${cat}"></div>`;
          container.insertAdjacentHTML('beforeend', html);
          renderCards(snap.docs.map(d => ({id:d.id, ...d.data()})), `grid-${cat}`);
        }
      }
    }

    window.onload = () => { loadBannerImage(); loadHomePosts(); loadRandomCategories(); };
  </script>

  <footer class="site-footer" style="background:#1a1a1a; padding:40px; margin-top:50px; text-align:center; border-top:1px solid #333;">
    <div class="site-footer-links" style="margin-bottom:15px;">
      <a href="policy.html?type=terms">이용약관</a> | <a href="policy.html?type=privacy">개인정보처리방침</a>
    </div>
    <p style="color:#666; font-size:0.9rem;">@2026 MyTierList.net | 문의: asy0009@naver.com</p>
  </footer>
</body>
</html>
