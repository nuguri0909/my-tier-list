<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">TierMaker</a>
      <div class="nav-links">
        <a href="index.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu">
      <span id="user-name-display" class="user-name">로그인해주세요</span>
      <button class="btn btn-small" id="btn-login" onclick="window.login()">구글 로그인</button>
      <button class="btn btn-small" id="btn-nickname" style="display:none;" onclick="window.setNickname()">닉네임 변경</button>
      <button class="btn btn-small" id="btn-logout" style="display:none;" onclick="window.logout()">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>🏆 나만의 티어 메이커</h1>
    </div>

    <div class="top-controls">
      <input type="text" id="tier-list-title" class="control-input" style="width: 300px;" placeholder="티어표 제목을 입력하세요 (예: 2026 영화 티어)">
      <select id="category-select" class="control-input" style="width: 150px;">
        <option value="기타">카테고리</option>
        <option value="애니">애니</option>
        <option value="게임">게임</option>
        <option value="영화">영화</option>
        <option value="음악">음악</option>
        <option value="만화">만화</option>
        <option value="소설">소설</option>        
      </select>
      <button class="btn btn-save" onclick="window.saveBoard()">💾 서버에 저장</button>
      <button class="btn" style="background:#f39c12;" onclick="window.downloadImage()">📸 이미지로 저장</button>
    </div>

    <div class="layout-wrapper">
      <div class="layout-left">
        <div class="controls" style="justify-content: flex-start; margin-bottom: 10px;">
          <button class="btn btn-small" onclick="window.addTier()">➕ 티어 줄 추가</button>
        </div>
        <div id="capture-area">
          <div id="board" class="tier-board"></div>
        </div>
      </div>

      <div class="layout-right">
        <div class="item-bank-container">
          <h3>📥 아이템 대기열</h3>
          <div id="item-bank" class="item-bank" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div>
        </div>
        
        <div class="input-section">
          <h3 style="margin-top: 0; color: #3498db;">➕ 신규 아이템 추가</h3>
          <div class="input-group">
            
            <label style="font-weight: bold; color: #ccc;">1. 아이템 이름 <span style="color: #888; font-size: 0.85rem; font-weight: normal;">(선택사항)</span></label>
            <input type="text" id="img-title" class="control-input" placeholder="예: 아이언맨 (미입력 시 이름 없이 추가됨)">
            
            <label style="font-weight: bold; color: #ccc; margin-top: 15px;">2. 이미지 등록 <span style="color: #e74c3c; font-size: 0.85rem; font-weight: normal;">(둘 중 하나 필수)</span></label>
            
            <div style="display: flex; gap: 15px; align-items: center; background: #222; padding: 15px; border-radius: 8px; border: 1px dashed #555;">
              
              <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                <span style="font-size: 0.9rem; color: #aaa;">방법 A. 웹 이미지 주소</span>
                <input type="text" id="img-url" class="control-input" placeholder="https://...">
              </div>
              
              <div style="font-weight: 900; color: #666; font-size: 1.2rem;">OR</div>
              
              <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                <span style="font-size: 0.9rem; color: #aaa;">방법 B. 내 PC/폰 파일</span>
                <input type="file" id="img-file" class="control-input" accept="image/*" style="padding: 7px;">
              </div>
              
            </div>
            
            <button class="btn btn-save" style="margin-top: 15px; padding: 12px; font-size: 1.1rem;" onclick="window.addNewItem()">추가하기</button>
          </div>
        </div>
        </div>
    </div>
  </div>

<div id="item-modal" class="modal-overlay">
  <div class="modal-content">
    
    <button class="btn-close" onclick="window.closeModal()">X</button>
    
    <div class="modal-header">
      <h2 style="margin: 0; color: #fff;">아이템 상세 설정</h2>
    </div>
    
    <div class="modal-body">
      <div class="modal-left">
        <img id="modal-img-preview" src="">
      </div>
      <div class="modal-right">
        <label style="font-weight:bold; color:#aaa; font-size:0.9rem;">아이템 이름</label>
        <input type="text" id="modal-title" class="control-input" placeholder="항목 이름 (예: 아이언맨)" style="font-size: 1.2rem;">
        
        <label style="font-weight:bold; color:#aaa; font-size:0.9rem; margin-top:5px;">상세 설명</label>
        <textarea id="modal-desc" class="control-input" placeholder="이 항목에 대한 자세한 설명이나 평가를 적어보세요!"></textarea>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn btn-save" style="flex:1; padding:12px; font-size:1.1rem;" onclick="window.saveItemInfo()">저장하기</button>
          <button class="btn" style="background:#e74c3c; padding:12px; font-size:1.1rem;" onclick="window.deleteItem()">삭제</button>
        </div>
      </div>
    </div>
  </div>
</div>

  <script type="module" src="script.js"></script>
</body>
</html>
