<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu"></div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>🏆 나만의 티어 메이커</h1>
    </div>

    <div class="top-controls">
      <input type="text" id="tier-list-title" class="control-input" style="width: 300px;" placeholder="티어표 제목을 입력하세요 (예: 2026 영화 티어)">
      <select id="category-select" class="control-input" style="width: 150px;">
        <option value="기타">카테고리</option>
        <option value="애니">애니</option>
        <option value="게임">게임</option>
        <option value="영화">영화</option>
        <option value="음악">음악</option>
        <option value="만화">만화</option>
        <option value="소설">소설</option>        
        <option value="캐릭터">캐릭터</option>    
        <option value="기타">기타</option>   
      </select>
      <button class="btn btn-save" onclick="window.saveBoard()">💾 서버에 저장</button>
      <button class="btn" style="background:#f39c12;" onclick="window.saveAsImage()">📸 이미지로 저장</button>
    </div>

    <div class="layout-wrapper">
      <div class="layout-left">
        <div class="controls" style="justify-content: flex-start; margin-bottom: 10px;">
          <button class="btn btn-small" onclick="window.addTier()">➕ 티어 줄 추가</button>
        </div>
        <div id="capture-area">
          <div id="board" class="tier-board">
            <div class="tier-row" data-tier="S" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"><div class="tier-label" style="background-color: #ff7f7f;" contenteditable="true">S</div><div class="tier-items" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><button class="delete-tier-btn" onclick="window.deleteTier(this)">X</button></div>
            <div class="tier-row" data-tier="A" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"><div class="tier-label" style="background-color: #ffbf7f;" contenteditable="true">A</div><div class="tier-items" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><button class="delete-tier-btn" onclick="window.deleteTier(this)">X</button></div>
            <div class="tier-row" data-tier="B" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"><div class="tier-label" style="background-color: #ffff7f;" contenteditable="true">B</div><div class="tier-items" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><button class="delete-tier-btn" onclick="window.deleteTier(this)">X</button></div>
            <div class="tier-row" data-tier="C" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"><div class="tier-label" style="background-color: #7fff7f;" contenteditable="true">C</div><div class="tier-items" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><button class="delete-tier-btn" onclick="window.deleteTier(this)">X</button></div>
            <div class="tier-row" data-tier="D" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"><div class="tier-label" style="background-color: #7fbfff;" contenteditable="true">D</div><div class="tier-items" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><button class="delete-tier-btn" onclick="window.deleteTier(this)">X</button></div>
            <div class="tier-row" data-tier="E" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"><div class="tier-label" style="background-color: #7f7fff;" contenteditable="true">E</div><div class="tier-items" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><button class="delete-tier-btn" onclick="window.deleteTier(this)">X</button></div>
          </div>
        </div>
      </div>

      <div class="layout-right">
        <div class="item-bank-container">
          <h3>📥 작품 대기열</h3>
          <div id="item-bank" class="item-bank" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div>
        </div>
        
        <div class="input-section">
          <h3 style="margin-top: 0; color: #3498db;">➕ 새 작품 추가</h3>
          <div class="input-group">
            
            <label style="font-weight: bold; color: #ccc;">1. 작품 이름 <span style="color: #888; font-size: 0.85rem; font-weight: normal;">(선택사항)</span></label>
            <input type="text" id="img-title" class="control-input" placeholder="예: 레옹 (미입력 시 이름 없이 추가됨)">
            
            <label style="font-weight: bold; color: #ccc; margin-top: 15px;">2. 이미지 등록 <span style="color: #e74c3c; font-size: 0.85rem; font-weight: normal;">(둘 중 하나 필수)</span></label>
            
            <div style="display: flex; flex-direction: column; gap: 10px; align-items: stretch; background: #222; padding: 15px; border-radius: 8px; border: 1px dashed #555;">
              
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <span style="font-size: 0.9rem; color: #aaa;">방법 A. 웹 이미지 주소</span>
                <input type="text" id="img-url" class="control-input" placeholder="https://...">
              </div>
              
              <div style="font-weight: 900; color: #666; font-size: 1.2rem; text-align: center; margin: 5px 0;">OR</div>
              
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <span style="font-size: 0.9rem; color: #aaa;">방법 B. 내 PC/폰 파일</span>
                <input type="file" id="img-file" class="control-input" accept="image/*" style="padding: 7px; width: 100%; box-sizing: border-box;">
              </div>
              
            </div>
            
            <button class="btn btn-save" style="margin-top: 15px; padding: 12px; font-size: 1.1rem;" onclick="window.addNewItem()">추가하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<div id="item-modal" class="modal-overlay">
  <div class="modal-content">
    
    <button class="btn-close" onclick="window.closeModal()">X</button>
    
    <div class="modal-header">
      <h2 style="margin: 0; color: #fff;">아이템 상세 설정</h2>
    </div>
    
    <div class="modal-body">
      <div class="modal-left">
        <img id="modal-img-preview" src="">
      </div>
      <div class="modal-right">
        <label style="font-weight:bold; color:#aaa; font-size:0.9rem;">아이템 이름</label>
        <input type="text" id="modal-title" class="control-input" placeholder="항목 이름 (예: 아이언맨)" style="font-size: 1.2rem;">
        
        <label style="font-weight:bold; color:#aaa; font-size:0.9rem; margin-top:5px;">상세 설명</label>
        <textarea id="modal-desc" class="control-input" placeholder="이 항목에 대한 자세한 설명이나 평가를 적어보세요!"></textarea>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn btn-save" style="flex:1; padding:12px; font-size:1.1rem;" onclick="window.saveItemInfo()">저장하기</button>
          <button class="btn" style="background:#e74c3c; padding:12px; font-size:1.1rem;" onclick="window.deleteItem()">삭제</button>
        </div>
      </div>
    </div>
  </div>
</div>

  <script type="module" src="script.js"></script>
  
  <footer class="site-footer">
    <div class="site-footer-links">
      <a href="policy.html?type=terms">이용약관</a> | 
      <a href="policy.html?type=privacy">개인정보처리방침</a> | 
      <a href="policy.html?type=youth">청소년 보호정책</a>
    </div>
    <div class="site-footer-info">
      <div>© 2026 MyTierList.net</div>
      <div style="margin-top: 5px;">문의: asy0009@naver.com</div>
    </div>
  </footer>
</body>
</html>
