<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 보관함 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ⭐ 게시판과 구분되는 가로형 리스트 레이아웃 */
    .list-container { display: flex; flex-direction: column; gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto; }
    
    .my-list-card { background: #1a1a24; border: 1px solid #2e2e3a; border-radius: 10px; display: flex; flex-direction: row; align-items: center; overflow: hidden; height: 120px; transition: 0.2s; }
    .my-list-card:hover { border-color: #555; background: #1e1e2b; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
    
    .my-list-img { width: 180px; height: 100%; background: #111; flex-shrink: 0; border-right: 1px solid #2e2e3a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .my-list-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .my-list-info { padding: 0 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
    .list-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #fff; word-break: keep-all; }
    .list-meta { color: #aaa; font-size: 0.9rem; line-height: 1.4; }
    
    .my-list-actions { padding: 20px; display: flex; gap: 10px; border-left: 1px solid #2e2e3a; height: 100%; align-items: center; }
    .my-list-actions button { padding: 10px 15px; font-size: 0.9rem; white-space: nowrap; height: 100%; max-height: 45px; }
    
    /* 모바일 환경 등 화면이 좁아질 때 세로로 변경되도록 반응형 추가 */
    @media (max-width: 600px) {
      .my-list-card { flex-direction: column; height: auto; }
      .my-list-img { width: 100%; height: 150px; border-right: none; border-bottom: 1px solid #2e2e3a; }
      .my-list-info { padding: 15px; text-align: center; }
      .my-list-actions { width: 100%; border-left: none; border-top: 1px solid #2e2e3a; justify-content: center; padding: 15px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu"></div>
  </nav>

  <div class="header" style="text-align: center; padding: 30px 20px;">
    <h1>내 보관함</h1>
    <p style="color:#aaa;">내가 저장한 티어표 목록입니다. 언제든 다시 수정할 수 있어요!</p>
  </div>

  <div class="list-container" id="my-list-container">
    <p style="text-align:center; color:#888;">데이터를 불러오는 중입니다...</p>
  </div>

  <script type="module" src="script.js"></script>

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const auth = getAuth();
    const db = getFirestore();

    onAuthStateChanged(auth, (user) => {
      window.currentUser = user;
      window.renderMyLists();
    });

    window.renderMyLists = async () => {
      const container = document.getElementById('my-list-container');
      if (!window.currentUser) {
        container.innerHTML = '<div style="text-align: center; padding: 50px; color: #888; background:#1a1a24; border-radius:12px; border: 1px solid #2e2e3a;">로그인 후 내 보관함을 확인할 수 있습니다.</div>';
        return;
      }

      try {
        // 색인(Index) 에러 방지를 위해 orderBy를 잠시 제거하고 가져온 뒤 자바스크립트로 정렬합니다.
        const q = query(collection(db, "tierLists"), where("authorId", "==", window.currentUser.uid));
        const snapshot = await getDocs(q);

        let lists = [];
        snapshot.forEach(docSnap => {
          lists.push({ id: docSnap.id, ...docSnap.data() });
        });

        // 자바스크립트 단에서 최신순 정렬
        lists.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        container.innerHTML = '';
        if (lists.length === 0) {
          container.innerHTML = '<div style="text-align: center; padding: 50px; color: #888; background:#1a1a24; border-radius:12px; border: 1px solid #2e2e3a;">저장된 티어표가 없습니다.</div>';
          return;
        }

        lists.forEach(data => {
          const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : "최근";
          
          // 썸네일 찾기 (최대한 이미지를 찾아냄)
          let finalImgUrl = 'https://via.placeholder.com/400x200?text=No+Image';
          if (data.thumbnailUrl) {
            finalImgUrl = data.thumbnailUrl;
          } else if (data.tiers && data.tiers.length > 0) {
            // 모든 티어를 뒤져서 첫 번째 이미지를 찾음
            for (const tier of data.tiers) {
              if (tier.items && tier.items.length > 0) {
                finalImgUrl = tier.items[0].src;
                break;
              }
            }
          }

          const card = document.createElement('div');
          card.className = 'my-list-card';
          card.innerHTML = `
            <div class="my-list-img">
              <img src="${finalImgUrl}" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Error'">
            </div>
            <div class="my-list-info">
              <div class="list-title">${data.title || "제목 없는 티어표"}</div>
              <div class="list-meta">
                <span style="color:#2ecc71; font-weight:bold;">[${data.category || "기타"}]</span><br>
                저장일: ${dateStr}
              </div>
            </div>
            <div class="my-list-actions">
              <button class="btn btn-save" onclick="location.href='maker.html?load=${data.id}&mode=v1'">수정하기</button>
              <button class="btn" style="background:#e74c3c;" onclick="window.deleteMyList('${data.id}')">삭제</button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = `<p style="color:red; text-align:center;">데이터 로드 실패: ${e.message}</p>`;
      }
    };

    window.deleteMyList = async (docId) => {
      if(confirm("정말 이 티어표를 삭제하시겠습니까?")) {
        try {
          await deleteDoc(doc(db, "tierLists", docId));
          alert("삭제되었습니다.");
          window.renderMyLists(); 
        } catch(e) { alert("삭제 실패: " + e.message); }
      }
    };
  </script>
</body>
</html>
