<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 보관함 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 게시판(board.html)과 완벽히 동일한 카드 레이아웃 적용 */
    .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    
    .tier-card { background: #1a1a24; border: 1px solid #2e2e3a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; height: 100%; min-height: 400px; }
    .tier-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
    
    .tier-card-img { height: 200px; background: #111118; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #2e2e3a; }
    .tier-card-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .tier-card-info { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
    .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #fff; word-break: keep-all; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { color: #aaa; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.4; }
    .card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu"></div>
  </nav>

  <div class="header" style="text-align: center; padding: 30px 20px;">
    <h1>내 보관함</h1>
    <p style="color:#aaa;">내가 저장한 티어표 목록입니다. 언제든 다시 수정할 수 있어요!</p>
  </div>

  <div class="board-grid" id="my-list-container">
    <p style="text-align:center; color:#888; grid-column: 1 / -1;">데이터를 불러오는 중입니다...</p>
  </div>

  <script type="module" src="script.js"></script>

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const auth = getAuth();
    const db = getFirestore();

    // 사용자의 로그인 상태가 변경될 때마다 내 보관함을 새로고침
    onAuthStateChanged(auth, (user) => {
      window.currentUser = user;
      window.renderMyLists();
    });

    window.renderMyLists = async () => {
      const container = document.getElementById('my-list-container');
      
      if (!window.currentUser) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; background:#1a1a24; border-radius:12px; border: 1px solid #2e2e3a;">로그인 후 내 보관함을 확인할 수 있습니다.</div>';
        return;
      }

      container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #aaa;">데이터를 불러오는 중입니다...</div>';

      try {
        // 최신순으로 정렬해서 가져오기
        const q = query(collection(db, "tierLists"), where("authorId", "==", window.currentUser.uid), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        container.innerHTML = '';
        
        if (snapshot.empty) {
          container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; background:#1a1a24; border-radius:12px; border: 1px solid #2e2e3a;">저장된 티어표가 없습니다. 첫 티어표를 만들어 보세요!</div>';
          return;
        }

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : "최근";

          // 썸네일 이미지 추출 (게시판과 동일한 로직)
          const imgUrl = (data.tiers && data.tiers[0] && data.tiers[0].items[0]) ? data.tiers[0].items[0].src : 'https://via.placeholder.com/300x150?text=No+Image';
          const finalImgUrl = data.thumbnailUrl || imgUrl;

          const card = document.createElement('div');
          card.className = 'tier-card';
          
          card.innerHTML = `
            <div class="tier-card-img">
              <img src="${finalImgUrl}" alt="대표 이미지">
            </div>
            <div class="tier-card-info">
              <div class="card-title">${data.title || data.category + " 티어표"}</div>
              <div class="card-meta">
                <span style="color:#2ecc71; font-weight:bold;">[${data.category || "기타"}]</span> | 
                저장일: ${dateStr}
              </div>
              <div class="card-actions">
                <button class="btn btn-save" style="width:100%; padding: 8px; font-size: 0.9rem; margin-bottom: 5px;" onclick="location.href='maker.html?load=${docSnap.id}&mode=v1'">이어서 수정하기</button>
                <button class="btn" style="background:#e74c3c; width:100%; padding: 8px; font-size: 0.9rem;" onclick="window.deleteMyList('${docSnap.id}')">이 티어표 삭제</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        // 복합 인덱스 에러 발생 시 안내 메시지
        if(e.message.includes("index")) {
           container.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; color: #ff9800;">데이터를 불러오기 위해 색인(Index) 설정이 필요합니다. 개발자 콘솔의 링크를 클릭해주세요!</div>`;
           console.error("Firebase 복합 인덱스 에러:", e.message);
        } else {
           container.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; color: red;">데이터를 불러오는데 실패했습니다: ${e.message}</div>`;
        }
      }
    };

    window.deleteMyList = async (docId) => {
      if(confirm("정말 이 티어표를 삭제하시겠습니까? (복구할 수 없습니다)")) {
        try {
          await deleteDoc(doc(db, "tierLists", docId));
          alert("성공적으로 삭제되었습니다.");
          window.renderMyLists(); 
        } catch(e) {
          alert("삭제 실패: " + e.message);
        }
      }
    };
  </script>

  <footer class="site-footer">
    <div class="site-footer-links">
      <a href="policy.html?type=terms">이용약관</a> | 
      <a href="policy.html?type=privacy">개인정보처리방침</a> | 
      <a href="policy.html?type=youth">청소년 보호정책</a>
    </div>
    <div class="site-footer-info">
      <div>© 2026 MyTierList.net</div>
      <div style="margin-top: 5px;">문의: asy0009@naver.com</div>
    </div>
  </footer>
</body>
</html>
