<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 보관함 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .my-tier-card { background: #1f1f1f; border: 1px solid #444; border-radius: 10px; padding: 20px; position: relative; transition: 0.2s; }
    .my-tier-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .delete-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .delete-btn:hover { background: #c0392b; }
    .card-title { font-size: 1.3rem; margin: 0 0 10px 0; color: #fff; width: 80%; word-break: keep-all; }
    .card-meta { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu"></div>
  </nav>

  <div class="header" style="text-align: center; padding: 30px 20px;">
    <h1>내 보관함</h1>
    <p style="color:#aaa;">내가 저장한 티어표 목록입니다. 언제든 다시 수정할 수 있어요!</p>
  </div>

  <div class="grid-container" id="my-list-container">
    <p style="text-align:center; color:#888; grid-column: 1 / -1;">데이터를 불러오는 중입니다...</p>
  </div>

  <script type="module" src="script.js"></script>

  <script type="module">
    import { getFirestore, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const db = getFirestore();

    window.deleteMyList = async (docId) => {
      if(confirm("정말 이 티어표를 삭제하시겠습니까? (복구할 수 없습니다)")) {
        try {
          await deleteDoc(doc(db, "tierLists", docId));
          alert("성공적으로 삭제되었습니다.");
          // script.js 에 있는 내 보관함 리로드 함수 호출
          if(window.loadMyList) window.loadMyList(); 
        } catch(e) {
          alert("삭제 실패: " + e.message);
        }
      }
    };
  </script>

  <footer class="site-footer">
    <div class="site-footer-links">
      <a href="policy.html?type=terms">이용약관</a> | 
      <a href="policy.html?type=privacy">개인정보처리방침</a> | 
      <a href="policy.html?type=youth">청소년 보호정책</a>
    </div>
    <div class="site-footer-info">
      <div>© 2026 MyTierList.net</div>
      <div style="margin-top: 5px;">문의: asy0009@naver.com</div>
    </div>
  </footer>
</body>
</html>
