<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 보관함 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 삭제 버튼 및 내 목록 전용 스타일 */
    .delete-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .delete-btn:hover { background: #c0392b; }
    .card-title { font-size: 1.3rem; margin: 0 0 10px 0; color: #fff; width: 80%; /* 삭제버튼과 안 겹치게 여백 줌 */ }
    .card-meta { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">TierMaker</a>
    <div class="nav-links">
      <a href="index.html">티어 만들기</a>
      <a href="board.html">티어 게시판</a>
      <a href="mylist.html">내 보관함</a>
    </div>
  </nav>

  <div class="header">
    <h1>🗂️ 내 보관함</h1>
  </div>

  <div class="grid-container" id="my-list"></div>

  <script>
    // 임시 테스트용 내 데이터
    let myDb = [
      { id: "m1", title: "나의 인생 영화 TOP 10", category: "영화", views: 42 },
      { id: "m2", title: "가장 매운 라면 순위", category: "기타", views: 120 }
    ];

    function renderMyLists() {
      const container = document.getElementById('my-list');
      container.innerHTML = '';
      
      if (myDb.length === 0) {
        container.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 50px; color: #888;">저장된 티어표가 없습니다. 첫 티어표를 만들어 보세요!</div>';
        return;
      }
      
      myDb.forEach(list => {
        const card = document.createElement('div');
        card.className = 'tier-card';
        card.innerHTML = `
          <button class="delete-btn" onclick="deleteList(event, '${list.id}')">삭제</button>
          <h3 class="card-title">${list.title}</h3>
          <div class="card-meta">📁 카테고리: ${list.category}</div>
          <div style="font-size: 0.9rem; color: #888; border-top: 1px solid #333; padding-top: 15px;">
            <span>👁️ ${list.views}회 조회</span>
          </div>
        `;
        card.onclick = (e) => {
          if(!e.target.classList.contains('delete-btn')) {
            alert(`[${list.title}] 수정 화면으로 이동합니다! (추후 연동)`);
          }
        };
        container.appendChild(card);
      });
    }

    window.deleteList = function(e, id) {
      e.stopPropagation(); // 카드 클릭 막기
      if(confirm("정말 이 티어표를 삭제하시겠습니까?")) {
        myDb = myDb.filter(l => l.id !== id);
        renderMyLists();
      }
    };

    window.onload = renderMyLists;
  </script>
</body>
</html>
