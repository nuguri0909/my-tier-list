<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 보관함 - 나만의 티어 메이커</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 게시판과 동일한 카드 레이아웃 */
    .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    
    .tier-card { background: #1a1a24; border: 1px solid #2e2e3a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; height: 100%; min-height: 400px; }
    .tier-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
    
    .tier-card-img { height: 200px; background: #111118; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #2e2e3a; }
    .tier-card-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .tier-card-info { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
    .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #fff; word-break: keep-all; }
    .card-meta { color: #aaa; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.4; }
    .card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">MyTierList</a>
      <div class="nav-links">
        <a href="maker.html">티어 만들기</a>
        <a href="board.html">티어 게시판</a>
        <a href="mylist.html">내 보관함</a>
      </div>
    </div>
    <div class="user-menu"></div>
  </nav>

  <div class="header" style="text-align: center; padding: 30px 20px;">
    <h1>내 보관함</h1>
    <p style="color:#aaa;">내가 저장한 티어표 목록입니다. 언제든 다시 수정할 수 있어요!</p>
  </div>

  <div class="board-grid" id="my-list-container">
    <p style="text-align:center; color:#888; grid-column: 1 / -1;">데이터를 불러오는 중입니다...</p>
  </div>

  <script type="module" src="script.js"></script>

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const auth = getAuth();
    const db = getFirestore();

    onAuthStateChanged(auth, (user) => {
      window.currentUser = user;
      window.renderMyLists();
    });

    window.renderMyLists = async () => {
      const container = document.getElementById('my-list-container');
      if (!window.currentUser) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; background:#1a1a24; border-radius:12px; border: 1px solid #2e2e3a;">로그인 후 내 보관함을 확인할 수 있습니다.</div>';
        return;
      }

      try {
        // 색인(Index) 에러 방지를 위해 orderBy를 잠시 제거하고 가져온 뒤 자바스크립트로 정렬합니다.
        const q = query(collection(db, "tierLists"), where("authorId", "==", window.currentUser.uid));
        const snapshot = await getDocs(q);

        let lists = [];
        snapshot.forEach(docSnap => {
          lists.push({ id: docSnap.id, ...docSnap.data() });
        });

        // 자바스크립트 단에서 최신순 정렬
        lists.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        container.innerHTML = '';
        if (lists.length === 0) {
          container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: #888;">저장된 티어표가 없습니다.</div>';
          return;
        }

        lists.forEach(data => {
          const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : "최근";
          
          // 썸네일 찾기 (최대한 이미지를 찾아냄)
          let finalImgUrl = 'https://via.placeholder.com/400x200?text=No+Image';
          if (data.thumbnailUrl) {
            finalImgUrl = data.thumbnailUrl;
          } else if (data.tiers && data.tiers.length > 0) {
            // 모든 티어를 뒤져서 첫 번째 이미지를 찾음
            for (const tier of data.tiers) {
              if (tier.items && tier.items.length > 0) {
                finalImgUrl = tier.items[0].src;
                break;
              }
            }
          }

          const card = document.createElement('div');
          card.className = 'tier-card';
          card.innerHTML = `
            <div class="tier-card-img">
              <img src="${finalImgUrl}" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Error'">
            </div>
            <div class="tier-card-info">
              <div class="card-title">${data.title || "제목 없는 티어표"}</div>
              <div class="card-meta">
                <span style="color:#2ecc71; font-weight:bold;">[${data.category || "기타"}]</span><br>
                저장일: ${dateStr}
              </div>
              <div class="card-actions">
                <button class="btn btn-save" style="width:100%;" onclick="location.href='maker.html?load=${data.id}&mode=v1'">수정하기</button>
                <button class="btn" style="background:#e74c3c; width:100%;" onclick="window.deleteMyList('${data.id}')">삭제</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = `<p style="color:red; text-align:center; grid-column:1/-1;">데이터 로드 실패: ${e.message}</p>`;
      }
    };

    window.deleteMyList = async (docId) => {
      if(confirm("정말 이 티어표를 삭제하시겠습니까?")) {
        try {
          await deleteDoc(doc(db, "tierLists", docId));
          alert("삭제되었습니다.");
          window.renderMyLists(); 
        } catch(e) { alert("삭제 실패: " + e.message); }
      }
    };
  </script>
</body>
</html>
